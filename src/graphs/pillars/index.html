<head>
  <meta charset="UTF-8">
  <title>Pillars</title>
  <meta name="viewport" content="width=device-width, initial-scale=0.6">  
  <script src="/src/pillars.min.js"></script>
</head>

<body class="h-full bg-black">	

    	<div id="graph"></div>

		<div class="flex top-10 left-10 absolute">
			<p id="constellation-title" class="font-mono text-white text-4xl"> Pillars </p>
			<button id="enableTools" type="button" class="hidden lg:block text-white text-xl bg-purple-950 ml-5 p-2 rounded-full">  
				<i class="">
					<svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 0 512 512"><!--! Font Awesome Free 6.4.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2023 Fonticons, Inc. --><path fill="#FFFFFF" d="M156.6 384.9L125.7 354c-8.5-8.5-11.5-20.8-7.7-32.2c3-8.9 7-20.5 11.8-33.8L24 288c-8.6 0-16.6-4.6-20.9-12.1s-4.2-16.7 .2-24.1l52.5-88.5c13-21.9 36.5-35.3 61.9-35.3l82.3 0c2.4-4 4.8-7.7 7.2-11.3C289.1-4.1 411.1-8.1 483.9 5.3c11.6 2.1 20.6 11.2 22.8 22.8c13.4 72.9 9.3 194.8-111.4 276.7c-3.5 2.4-7.3 4.8-11.3 7.2v82.3c0 25.4-13.4 49-35.3 61.9l-88.5 52.5c-7.4 4.4-16.6 4.5-24.1 .2s-12.1-12.2-12.1-20.9V380.8c-14.1 4.9-26.4 8.9-35.7 11.9c-11.2 3.6-23.4 .5-31.8-7.8zM384 168a40 40 0 1 0 0-80 40 40 0 1 0 0 80z"/></svg>
				</i>
			</button>
		</div>

		<div id="constellation-tools" class="top-20 left-10 absolute">
			<div id="tools" class="hidden font-mono rounded-xl mt-5 p-5 bg-purple-950 text-white text-xl">
				<div id="toolsContainer" class="text-2xl">
				
					<div class="hidden lg:block">
						<label> Zoom: </label>
						<button id="zoomInButton" type="button"> + </button>
						<button id="zoomOutButton" type="button"> - </button><br>
					</div>

					<input autocomplete="off" name="selector" id="selector3dprint" type="radio"> 3D Print </input><br>
					<input autocomplete="off" name="selector" id="selectorProgramming" type="radio"> Programming </input><br>
					<input autocomplete="off" name="selector" id="selectorServer" type="radio"> Servers </input><br>
					<input autocomplete="off" name="selector" id="selectorAll" type="radio" checked> All </input><br>

					<div class="flex">
						<input type="checkbox" id="interactionButton" autocomplete="off"></input>
						<label class="hidden lg:block ml-3"> Enable mouse control </label>
						<label class="block  lg:hidden ml-3"> Enable touch control </label> 
					</div>
				</div>
			</div>
		</div>

</body>
