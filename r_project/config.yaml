baseurl: https://alejandrogp.com/ 
languageCode: en-us
theme: "hugo-theme-stack"
paginate: 5
title: Alejandro García Peláez

languages:
    en:
        languageName: English
        title: Alejandro García Peláez
        description:
        weight: 2
    es:
        languageName: Español
        title: Alejandro García Peláez
        description:
        weight: 1


disqusShortname: hugo-theme-stack

# GA Tracking ID
googleAnalytics:

# Publish Dir

publishDir: "aleph8.github.io"

DefaultContentLanguage: es

hasCJKLanguage: false

permalinks:
    post: /p/:year/:slug/
    page: /:slug/

params:
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true
    favicon: img/favicon.ico  

    footer:
        since: 2021
        customText: A custom model, made by me ,of Stack theme made by Jimmy Cai.

    dateFormat:
        published: Jan 02, 2006
        lastUpdated: Jan 02, 2006 15:04 MST

    sidebar:
        emoji: 🦅
        subtitle:
        avatar:
            enabled: true
            local: true
            src: img/avatar2.png

    article:
        math: false
        toc: true
        readingTime: true
        license:
            enabled: true
            default: Licensed under CC BY-NC-SA 4.0

    comments:
        enabled: false
        provider:

        disqusjs:
            shortname:
            apiUrl:
            apiKey:
            admin:
            adminLabel:

        utterances:
            repo:
            issueTerm: 
            label:

        remark42:
            host:
            site:
            locale:

        vssue:
            platform:
            owner:
            repo:
            clientId:
            clientSecret:
            autoCreateIssue:

        waline:
            serverURL:
            lang:
            pageview:
            emoji:
            requiredMeta:
            locale:
                admin:
                placeholder:

        twikoo:
            envId:
            region:
            path:
            lang:

        cactus:
            defaultHomeserverUrl: 
            serverName: 
            siteName: 

        giscus:
            repo:
            repoID:
            category:
            categoryID:
            mapping:
            lightTheme:
            darkTheme:
            reactionsEnabled: 1
            emitMetadata: 0

        gitalk:
            owner:
            admin:
            repo:
            clientID:
            clientSecret:

        cusdis:
            host:
            id:
    widgets:
        homepage:

            - type: categories
              params:
                  limit: 10
            - type: tag-cloud
              params:
                  limit: 10
            - type: archives
              params:
                  limit: 5
                  icon: archives
        page:
            - type: toc

    opengraph:
        twitter:

            site:

 
            card: summary_large_image

    defaultImage:
        opengraph:
            enabled: false
            local: false
            src:

    colorScheme:

        toggle: true

 
        default: dark

    imageProcessing:
        cover:
            enabled: false
        content:
            enabled: true

menu:
    main: []

    social:
        - identifier: github
          name: GitHub
          url: https://github.com/aleph8
          params:
              icon: brand-github

        - identifier: linkedin
          name: LinkedIn
          url: https://es.linkedin.com/in/alegpwk
          params:
              icon: brand-linkedin
              
        - identifier: Pentesting
          name: Pentesting
          url: https://fox4artic.github.io/
          params:
              icon: brand-bug

related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100

        - name: categories
          weight: 200

markup:
    goldmark:
        renderer:
            ## Set to true if you have HTML content inside Markdown
            unsafe: true
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: true
        lineNumbersInTable: true
        tabWidth: 4
